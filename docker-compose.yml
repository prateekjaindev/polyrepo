version: '3.8'

services:
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  frontend:
    image: quay.io/prateekjain/frontend:latest
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=/
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
    restart: unless-stopped

  auth-service:
    image: quay.io/prateekjain/auth-service:latest
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/auth-service
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo
    restart: unless-stopped

  user-service:
    image: quay.io/prateekjain/user-service:latest
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/user-service
    depends_on:
      - mongo
    restart: unless-stopped

  product-service:
    image: quay.io/prateekjain/product-service:latest
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/product-service
    depends_on:
      - mongo
    restart: unless-stopped

  order-service:
    image: quay.io/prateekjain/order-service:latest
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/order-service
      - PRODUCT_SERVICE_URL=http://product-service:3003
    depends_on:
      - mongo
      - product-service
    restart: unless-stopped

volumes:
  mongo-data:
