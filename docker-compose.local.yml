version: '3.8'

services:
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- -H 0.0.0.0"
    stdin_open: true
    tty: true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - MONGO_URL=mongodb://mongo:27017/auth-service
      - JWT_SECRET=your-secret-key
    depends_on:
      - mongo
    volumes:
      - ./auth-service:/app
      - /app/node_modules

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - MONGO_URL=mongodb://mongo:27017/user-service
    depends_on:
      - mongo
    volumes:
      - ./user-service:/app
      - /app/node_modules

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - MONGO_URL=mongodb://mongo:27017/product-service
    depends_on:
      - mongo
    volumes:
      - ./product-service:/app
      - /app/node_modules

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - MONGO_URL=mongodb://mongo:27017/order-service
      - PRODUCT_SERVICE_URL=http://product-service:3003
    depends_on:
      - mongo
      - product-service
    volumes:
      - ./order-service:/app
      - /app/node_modules

volumes:
  mongo-data:
